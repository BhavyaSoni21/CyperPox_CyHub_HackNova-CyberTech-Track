services:
  - type: web
    name: cyhub-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: CORS_ORIGINS
        value: https://cyper-pox-cy-hub-hack-nova-cyber-te-two.vercel.app
      - key: MONGODB_URI
        sync: true
      - key: MONGODB_DB
        value: cyhub
